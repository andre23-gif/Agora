<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>AgoraMosaïque</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- STYLE GLOBAL -->
  <link rel="stylesheet" href="style.css">

  <!-- Version app -->
  <script>
    window.APP_VERSION = "v1.0.1";
  </script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

  <!-- ========================= -->
  <!-- BANDEAU GLOBAL            -->
  <!-- ========================= -->

  <header class="ag-header">

    <!-- Support SVG pour volutes -->
    <svg class="ag-volutes" viewBox="0 0 1000 200" preserveAspectRatio="none">
      <defs>
        <linearGradient id="voluteColor">
          <stop offset="0%" stop-color="#ffb35c"/>
          <stop offset="50%" stop-color="#d77a36"/>
          <stop offset="100%" stop-color="#ffb35c"/>
        </linearGradient>
      </defs>

      <!-- Volute principale diagonale -->
      <path
        d="M0,120 C250,20 750,180 1000,80"
        stroke="url(#voluteColor)"
        stroke-width="3"
        fill="none"
      />

      <!-- Volute secondaire -->
      <path
        d="M0,80 C300,180 700,20 1000,120"
        stroke="url(#voluteColor)"
        stroke-width="2"
        fill="none"
      />
    </svg>

    <!-- Marque -->
    <div class="ag-brand">
      <img src="icon-192.png" alt="Logo AgoraMosaïque">
      <h1 class="ag-title">AgoraMosaïque</h1>
    </div>

    <!-- Navigation -->
    <nav class="ag-tabs">
      <button id="navSalle">Salle</button>
      <button id="navClassesHG">Classes HG</button>
      <button id="navBulletinsHG">Bulletins HG</button>
      <button id="navPP">PP</button>
      <button id="navEDT">EDT</button>
      <button id="navImportExport">Import / Export</button>
      <button id="navArchives">Archives</button>
    </nav>

  </header>

  <!-- ========================= -->
  <!-- CONTENU SPA               -->
  <!-- ========================= -->

  <div id="app"></div>

  <!-- ========================= -->
  <!-- CONFIG GLOBALE            -->
  <!-- ========================= -->

  <script>
    const SUPABASE_URL = "https://bkztwcyrqszqwicyqnzb.supabase.co";
    const SUPABASE_ANON_KEY = "TA_CLE_COMPLETE_ICI";

    window.sb = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY,
      { db: { schema: "agoram" } }
    );

    window.appAnneeCourante = "2024-2025";
  </script>

  <!-- ========================= -->
  <!-- SERVICE WORKER            -->
  <!-- ========================= -->

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>

  <!-- ========================= -->
  <!-- ROUTAGE SPA               -->
  <!-- ========================= -->

  <script type="module">

    const V = window.APP_VERSION;

    const { renderSalle, bindSalleEvents } =
      await import(`./pages/salle.js?v=${V}`);

    const { renderClassesHG } =
      await import(`./pages/classesHG.js?v=${V}`);

    const { renderBulletinsHG, bindBulletinsHGEvents } =
      await import(`./pages/bulletinsHG.js?v=${V}`);

    const { renderPP, bindPPEvents } =
      await import(`./pages/pp.js?v=${V}`);

    const { renderEmploiDuTemps, bindEmploiDuTempsEvents } =
      await import(`./pages/emploiDuTemps.js?v=${V}`);

    const { renderImportExport, bindImportExportEvents } =
      await import(`./pages/importExport.js?v=${V}`);

    const { renderArchives, bindArchivesEvents } =
      await import(`./pages/archives.js?v=${V}`);

    const app = document.getElementById("app");

    function afficher(renderFn, bindFn) {
      app.innerHTML = renderFn();
      if (bindFn) bindFn();
    }

    document.getElementById("navSalle").onclick = () =>
      afficher(renderSalle, bindSalleEvents);

    document.getElementById("navClassesHG").onclick = () =>
      afficher(renderClassesHG);

    document.getElementById("navBulletinsHG").onclick = () =>
      afficher(renderBulletinsHG, bindBulletinsHGEvents);

    document.getElementById("navPP").onclick = () =>
      afficher(renderPP, bindPPEvents);

    document.getElementById("navEDT").onclick = () =>
      afficher(renderEmploiDuTemps, bindEmploiDuTempsEvents);

    document.getElementById("navImportExport").onclick = () =>
      afficher(renderImportExport, bindImportExportEvents);

    document.getElementById("navArchives").onclick = () =>
      afficher(renderArchives, bindArchivesEvents);

    // page par défaut
    afficher(renderSalle, bindSalleEvents);

  </script>

</body>
</html>
