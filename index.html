<!DOCTYPE html>
<html lang="fr">
  <head>
    <header class="ag-header">

  </div>

  <nav class="ag-tabs">

    <button id="navBulletinsHG">Bulletins HG</button>
    <button id="navPP">PP</button>

    <!-- Encodage -->

    <!-- PWA -->

    <!-- Style global (Art déco v1.0) -->

<script>

  <body>
    <!-- ========================= -->
    <!-- EN-TÊTE                   -->

    <!-- ========================= -->
    <!-- NAVIGATION PRINCIPALE     -->
    <!-- ========================= -->

    <nav>
      <button id="navSalle">Salle</button>
      <button id="navClassesHG">Classes HG</button>
      <button id="navBulletinsHG">Bulletins HG</button>
      <button id="navPP">PP</button>
      <button id="navEDT">EDT</button>
      <button id="navImportExport">Import / Export</button>
      <button id="navArchives">Archives</button>
    </nav>

    <!-- ========================= -->
    <!-- CONTENEUR SPA             -->
    <!-- ========================= -->

    <div id="app"></div>

    <!-- ========================= -->
    <!-- SUPABASE (INITIALISATION) -->
    <!-- ========================= -->

    <script>
      const SUPABASE_URL = "https://bkztwcyrqszqwicyqnzb.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrenR3Y3lycXN6cXdpY3lxbnpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDI3NDgsImV4cCI6MjA5MzExODc0OH0.2ZJdCCijDCAb-UDrjaxOLz9hlnFaZuE_K3ncG9KDQYE";

      window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        db: { schema: "agoram" }
      });

      /* Année scolaire courante (modifiable plus tard) */
      window.appAnneeCourante = "2024-2025";
    </script>

    <!-- ========================= -->
    <!-- SERVICE WORKER (PWA)      -->
    <!-- ========================= -->

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>

    <!-- ========================= -->
    <!-- NAVIGATION SPA            -->
    <!-- ========================= -->

    <script type="module">
      import { renderSalle, bindSalleEvents } from "./pages/salle.js";
      import { renderClassesHG } from "./pages/classesHG.js";
      import { renderBulletinsHG, bindBulletinsHGEvents } from "./pages/bulletinsHG.js";
      import { renderPP, bindPPEvents } from "./pages/pp.js";
      const { renderEmploiDuTemps, bindEmploiDuTempsEvents } =
  await import("./pages/emploiDuTemps.js?v=" + window.APP_VERSION);
      import { renderImportExport, bindImportExportEvents } from "./pages/importExport.js";
      import { renderArchives, bindArchivesEvents } from "./pages/archives.js";

      const app = document.getElementById("app");

      function afficher(renderFn, bindFn) {
        app.innerHTML = renderFn();
        if (bindFn) bindFn();
      }

      // Navigation
      document.getElementById("navSalle").onclick = () =>
        afficher(renderSalle, bindSalleEvents);

document.getElementById("navClassesHG").onclick = () =>
  afficher(renderClassesHG);

      document.getElementById("navBulletinsHG").onclick = () =>
        afficher(renderBulletinsHG, bindBulletinsHGEvents);

      document.getElementById("navPP").onclick = () =>
        afficher(renderPP, bindPPEvents);

      document.getElementById("navEDT").onclick = () =>
        afficher(renderEmploiDuTemps, bindEmploiDuTempsEvents);

      document.getElementById("navImportExport").onclick = () =>
        afficher(renderImportExport, bindImportExportEvents);

      document.getElementById("navArchives").onclick = () =>
        afficher(renderArchives, bindArchivesEvents);

      // Page par défaut (v1.0)
      afficher(renderSalle, bindSalleEvents);
    </script>
  </body>
