<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>AgoraMosaïque</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
<script src="bandeau.js"></script>
  <!-- =====================================================
       AG_APP_VERSION_V1
       ===================================================== -->
  <script>
    window.APP_VERSION = "v1.0.6";
  </script>

  <!-- Supabase JS (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- =====================================================
       ÉCRAN CONNEXION
       ===================================================== -->
  <div id="authScreen">
    <input id="authEmail" type="email" placeholder="email">
    <input id="authPassword" type="password" placeholder="mot de passe">
    <button id="authBtn">Connexion</button>
    <span id="authDot"></span>
  </div>

  <!-- =====================================================
       HEADER
       ===================================================== -->
  <header class="ag-header" id="mainHeader" style="display:none;">
    <div class="ag-brand">
      <img src="icon-192.png" alt="">
      <h1>AgoraMosaïque</h1>
    </div>

    <nav class="ag-tabs">
      <button id="navSalle">Salle</button>
      <button id="navClassesHG">Classes HG</button>
      <button id="navBulletinsHG">Bulletins HG</button>
      <button id="navPP">PP</button>
      <button id="navEDT">EDT</button>
      <button id="navImportExport">Import / Export</button>
      <button id="navArchives">Archives</button>
    </nav>
  </header>

  <!-- =====================================================
       APP
       ===================================================== -->
  <div id="app" style="display:none;"></div>

  <!-- =====================================================
       CONFIG SUPABASE
       ===================================================== -->
  <script>
    const SUPABASE_URL = "https://bkztwcyrqszqwicyqnzb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrenR3Y3lycXN6cXdpY3lxbnpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDI3NDgsImV4cCI6MjA5MzExODc0OH0.2ZJdCCijDCAb-UDrjaxOLz9hlnFaZuE_K3ncG9KDQYE";

    window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.appAnneeCourante = "2024-2025";
  </script>

  <!-- =====================================================
       ROUTAGE (MODULE)
       - Corrige définitivement les erreurs de chemin GitHub Pages
       - Conserve toutes les fonctionnalités
       ===================================================== -->
  <script type="module">
    /* =====================================================
       AG_ROUTER_MODULE_V2
       ===================================================== */

    const V = window.APP_VERSION || "v1";

    // Base URL réelle (marche en local, GitHub Pages, sous-dossier /Agora/, etc.)
    // Exemple: si index est https://.../Agora/index.html
    // BASE_URL devient https://.../Agora/
    const BASE_URL = new URL("./", import.meta.url);

    // Helper d'import robuste : construit toujours l'URL correcte + ajoute ?v=
  
async function importPage(relPath) {
  const u = new URL(relPath, BASE_URL);
  u.searchParams.set("v", V);
  return import(u.href);
}


    // Import des pages (toutes via le même mécanisme fiable)
    // =====================================================
    let renderSalle, bindSalleEvents;
    let renderClassesHG, bindClassesHGEvents;
    let renderBulletinsHG, bindBulletinsHGEvents;
    let renderPP, bindPPEvents;
    let renderEmploiDuTemps, bindEmploiDuTempsEvents;
    let renderImportExport, bindImportExportEvents;
    let renderArchives, bindArchivesEvents;

    try {
      ({ renderSalle, bindSalleEvents } = await importPage("./pages/salle.js"));
     ({ renderClassesHG, bindClassesHGEvents } = await importPage("./pages/classesHG.js"));
      ({ renderBulletinsHG, bindBulletinsHGEvents } = await importPage("./pages/bulletinsHG.js"));
      ({ renderPP, bindPPEvents } = await importPage("./pages/pp.js"));
      ({ renderEmploiDuTemps, bindEmploiDuTempsEvents } = await importPage("./pages/emploiDuTemps.js"));
      ({ renderImportExport, bindImportExportEvents } = await importPage("./pages/importExport.js"));
      ({ renderArchives, bindArchivesEvents } = await importPage("./pages/archives.js"));
    } catch (e) {
      console.error("Erreur import modules:", e);
      alert("Erreur de chargement des modules. Ouvre la console (F12) pour voir quel fichier manque.");
      throw e; // stop net : évite état incohérent
    }

    const app = document.getElementById("app");

    // =====================================================
    // AUTH
    // =====================================================

    const authScreen = document.getElementById("authScreen");
    const authBtn = document.getElementById("authBtn");
    const emailInput = document.getElementById("authEmail");
    const passwordInput = document.getElementById("authPassword");
    const authDot = document.getElementById("authDot");

    const header = document.getElementById("mainHeader");
    const appDiv = document.getElementById("app");

    function setAuthState(ok) {
      if (ok) {
        authScreen.style.display = "none";
        header.style.display = "";
        appDiv.style.display = "";
        authDot.classList.add("ok");
      } else {
        authScreen.style.display = "flex";
        header.style.display = "none";
        appDiv.style.display = "none";
        authDot.classList.remove("ok");
      }
    }

    // Vérification session au démarrage
    const { data } = await window.sb.auth.getSession();
    setAuthState(!!data.session);

    // Connexion
    authBtn.addEventListener("click", async () => {
      const email = emailInput.value;
      const password = passwordInput.value;

      const { error } = await window.sb.auth.signInWithPassword({ email, password });

      if (error) {
        alert("Connexion échouée");
        console.error(error);
      } else {
        setAuthState(true);
      }
    });

    // =====================================================
    // ROUTAGE
    // =====================================================

    /* === AG_ROUTAGE_AFFICHER_ASYNC_V2 === */
    async function afficher(renderFn, bindFn) {
      try {
        const html = await renderFn();
        app.innerHTML = html;
        if (bindFn) bindFn();
      } catch (e) {
        console.error("Erreur render/bind:", e);
        app.innerHTML = "<div class='card'>Erreur d’affichage. Ouvre la console (F12).</div>";
      }
    }

    // Boutons nav
    document.getElementById("navSalle").onclick = () =>
      afficher(renderSalle, bindSalleEvents);


document.getElementById("navClassesHG").onclick = () =>
  afficher(renderClassesHG, bindClassesHGEvents);

    document.getElementById("navBulletinsHG").onclick = () =>
      afficher(renderBulletinsHG, bindBulletinsHGEvents);

    document.getElementById("navPP").onclick = () =>
      afficher(renderPP, bindPPEvents);

    document.getElementById("navEDT").onclick = () =>
      afficher(renderEmploiDuTemps, bindEmploiDuTempsEvents);

    document.getElementById("navImportExport").onclick = () =>
      afficher(renderImportExport, bindImportExportEvents);

    document.getElementById("navArchives").onclick = () =>
      afficher(renderArchives, bindArchivesEvents);

    // Page par défaut
    afficher(renderSalle, bindSalleEvents);

  </script>

</body>
</html>
